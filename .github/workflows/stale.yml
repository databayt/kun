name: Stale

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: |
            This issue has been quiet for 30 days. It will close in 7 days unless someone comments to keep it open.

            If you're working on it, drop a brief status update. If it should stay open indefinitely, ask a maintainer to add the `pinned` label.
          close-issue-message: "Closing as stale. Reopen with a comment if this is still relevant."
          exempt-issue-labels: "type/report,pinned,security,priority/p0,priority/p1,status/in-progress,status/in-review,monthly-report"
          # PRs
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: |
            This PR has been quiet for 14 days. It will close in 7 days unless an update lands.
          close-pr-message: "Closing as stale. Reopen with a comment if you'd like to continue."
          exempt-pr-labels: "pinned,security,priority/p0,priority/p1,wip"
          # Limits
          operations-per-run: 100
