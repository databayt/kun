version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Khartoum"
    open-pull-requests-limit: 5
    reviewers:
      - "abdout"
    labels:
      - "type/chore"
      - "area: deps"
      - "priority/p3"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      development:
        patterns:
          - "@types/*"
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier*"
          - "vitest*"
          - "@vitest/*"
      next-core:
        patterns:
          - "next"
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"
      fumadocs:
        patterns:
          - "fumadocs-*"
      anthropic:
        patterns:
          - "@anthropic-ai/*"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "abdout"
    labels:
      - "type/chore"
      - "area: workflow"
      - "priority/p3"
    commit-message:
      prefix: "chore(ci)"
