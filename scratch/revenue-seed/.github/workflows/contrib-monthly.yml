name: Monthly contribution report

on:
  schedule:
    - cron: "0 3 1 * *" # 1st of month, 03:00 UTC
  workflow_dispatch:
    inputs:
      month:
        description: "YYYY-MM (defaults to prior month)"
        required: false

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine target month
        id: month
        run: |
          if [ -n "${{ inputs.month }}" ]; then
            M="${{ inputs.month }}"
          else
            M=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m 2>/dev/null || date -u -v-1m +%Y-%m)
          fi
          echo "value=$M" >> "$GITHUB_OUTPUT"

      - name: Generate monthly report
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_PAT }}
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          node scripts/monthly-report.mjs --month "$MONTH" --out "reports/monthly-report-${MONTH}.md"

      - name: Commit report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "kun-bot"
          git config user.email "noreply@databayt.org"
          git add reports/
          if ! git diff --staged --quiet; then
            git commit -m "chore(report): monthly ${{ steps.month.outputs.value }}"
            git push
          fi

      - name: Open tracking issue with breakdown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          gh issue create \
            --title "Monthly contribution report — $MONTH" \
            --body-file "reports/monthly-report-${MONTH}.md" \
            --label "monthly-report"
